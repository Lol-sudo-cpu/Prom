<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trade Request</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="trade_ui_container">
        <div class="trade_header">
            <h2>TRADE</h2>
        </div>
        
        <div class="trade_panels">
            <div class="player_panel left_panel">
                <div class="player_name">[Her Name]</div>
                <div class="offer_grid">
                    <div class="item_box">
                        <span class="item_text">A Magical Night</span>
                    </div>
                    <div class="item_box empty"></div>
                    <div class="item_box empty"></div>
                    <div class="item_box empty"></div>
                </div>
            </div>

            <div class="trade_divider">
                <div class="arrows">⇄</div>
            </div>

            <div class="player_panel right_panel">
                <div class="player_name">Leon</div>
                <div class="offer_grid">
                    <div class="item_box">
                        <span class="item_text">Prom Date</span>
                    </div>
                    <div class="item_box empty"></div>
                    <div class="item_box empty"></div>
                    <div class="item_box empty"></div>
                </div>
            </div>
        </div>

        <div class="trade_actions">
            <button id="btn_decline" class="adopt_btn decline">Decline</button>
            <button id="btn_accept" class="adopt_btn accept">Accept</button>
        </div>
    </div>

    <div id="success_screen" class="hidden">
        <h1 class="success_text">TRADE SUCCESSFUL! 🎉</h1>
        <p class="success_subtext">See you at Prom.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
