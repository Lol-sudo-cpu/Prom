<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trade Request</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="trade-window" class="trade-window">
        <h2>Trade Request</h2>
        <p>User "Prom Date" wants to trade: <strong>Your Company</strong></p>
        <p>For: <strong>A Magical Night</strong></p>
        <div class="button-container">
            <button id="accept-btn">Accept</button>
            <button id="decline-btn">Decline</button>
        </div>
    </div>

    <div id="success-screen" class="hidden">
        <h1>Trade Accepted! 💖</h1>
        <p>See you at prom!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
