<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trade Request</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #a3d5ff; /* Game sky background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* The main outer window */
        #trade_ui_container {
            background-color: #fce4ec; /* Very light pink outer edge */
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        /* The thick pink inner border */
        .trade_inner_box {
            background-color: white;
            border: 8px solid #ed5393; /* Adopt Me Hot Pink */
            width: 750px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .trade_content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Player panels */
        .player_side {
            width: 42%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player_name {
            color: #ed5393;
            font-size: 16px;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        /* The 3x3 Grid */
        .grid_container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px; /* Creates the pink grid lines */
            background-color: #ed5393; /* The grid line color */
            border: 4px solid #ed5393;
            width: 100%;
            aspect-ratio: 1 / 1;
        }

        /* The light pink empty squares */
        .grid_cell {
            background-color: #fcaecf; /* Adopt Me Light Pink */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The green plus box */
        .green_plus_box {
            background-color: #63b955; /* Adopt Me Green */
            width: 75%;
            height: 75%;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 45px;
            line-height: 0;
            padding-bottom: 5px;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15); /* 3D effect */
        }

        /* Your offer text */
        .offer_text {
            color: white;
            text-align: center;
            font-size: 18px;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.2);
            line-height: 1.2;
        }

        /* Center divider */
        .trade_divider {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ed5393;
        }

        .trade_text {
            font-size: 18px;
            letter-spacing: 1px;
        }

        .trade_icon {
            font-size: 50px;
            line-height: 0.8;
            margin-top: 10px;
        }

        /* Buttons */
        .trade_actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .adopt_btn {
            font-size: 18px;
            padding: 10px 35px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2); /* 3D game button effect */
            transition: transform 0.1s;
        }

        .adopt_btn:active {
            transform: translateY(4px);
            box-shadow: inset 0 0px 0 rgba(0,0,0,0.2);
        }

        .decline { background-color: #d84c4c; } /* Adopt Me Red */
        .accept { background-color: #63b955; }  /* Adopt Me Green */

        .hidden { display: none !important; }

        #success_screen {
            text-align: center;
            color: #ed5393;
            background: white;
            padding: 40px;
            border-radius: 20px;
            border: 8px solid #ed5393;
        }
    </style>
</head>
<body>

    <div id="trade_ui_container">
        <div class="trade_inner_box">
            
            <div class="trade_content">
                <div class="player_side">
                    <div class="player_name">Diti (Licensed)</div>
                    <div class="grid_container">
                        <div class="grid_cell"><div class="green_plus_box">+</div></div>
                        <div class="grid_cell"></div><div class="grid_cell"></div>
                        <div class="grid_cell"></div><div class="grid_cell"></div><div class="grid_cell"></div>
                        <div class="grid_cell"></div><div class="grid_cell"></div><div class="grid_cell"></div>
                    </div>
                </div>

                <div class="trade_divider">
                    <div class="trade_text">TRADE</div>
                    <div class="trade_icon">⟲⟳</div> 
                </div>

                <div class="player_side">
                    <div class="player_name">Leon (Licensed)</div>
                    <div class="grid_container">
                        <div class="grid_cell offer_text">Prom<br>Date</div>
                        <div class="grid_cell"></div><div class="grid_cell"></div>
                        <div class="grid_cell"></div><div class="grid_cell"></div><div class="grid_cell"></div>
                        <div class="grid_cell"></div><div class="grid_cell"></div><div class="grid_cell"></div>
                    </div>
                </div>
            </div>

            <div class="trade_actions">
                <button id="btn_decline" class="adopt_btn decline">Decline</button>
                <button id="btn_accept" class="adopt_btn accept">Accept</button>
            </div>

        </div>
    </div>

    <div id="success_screen" class="hidden">
        <h1 style="font-size: 40px; margin-bottom: 10px;">TRADE SUCCESSFUL!</h1>
        <p style="font-size: 20px; color: #333;">See you at Prom.</p>
    </div>

    <script>
        const btn_decline = document.getElementById('btn_decline');
        const btn_accept = document.getElementById('btn_accept');
        const trade_ui_container = document.getElementById('trade_ui_container');
        const success_screen = document.getElementById('success_screen');

        let decline_count = 0;
        const decline_messages = [
            "Are you sure you want to decline?", 
            "Think carefully!", 
            "Error: Cannot decline this trade.", 
            "Just click accept!"
        ];

        btn_decline.addEventListener('click', () => {
            alert(decline_messages[decline_count % decline_messages.length]);
            decline_count++;
            
            // Moves the button after the first click so she can't easily click it again
            btn_decline.style.position = 'absolute';
            btn_decline.style.top = Math.random() * 70 + 10 + 'vh';
            btn_decline.style.left = Math.random() * 70 + 10 + 'vw';
        });

        btn_accept.addEventListener('click', () => {
            trade_ui_container.classList.add('hidden');
            success_screen.classList.remove('hidden');
            document.body.style.backgroundColor = "#ffcce6"; 
        });
    </script>
</body>
</html>
