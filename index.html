<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incoming Trade Proposal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-overlay">
        <div id="trade-container">
            <div id="trade-window">
                
                <div class="user-side">
                    <h3>[Her GitHub Username] (Licensed)</h3>
                    <div class="grid-container left-grid">
                        <div class="grid-item add-icon"><span>+</span></div>
                        <div class="grid-item"></div><div class="grid-item"></div>
                        <div class="grid-item"></div><div class="grid-item"></div>
                        <div class="grid-item"></div><div class="grid-item"></div>
                        <div class="grid-item"></div><div class="grid-item"></div>
                    </div>
                </div>

                <div id="trade-center">
                    <p>TRADE</p>
                    <div class="trade-arrows">&#8635;</div> </div>

                <div class="user-side">
                    <h3>[Your GitHub Username] (Licensed)</h3>
                    <div class="grid-container right-grid">
                        <div class="grid-item offer-text"><span>A Magical<br>Night</span></div>
                        <div class="grid-item"></div><div class="grid-item"></div>
                        <div class="grid-item"></div><div class="grid-item"></div>
                        <div class="grid-item"></div><div class="grid-item"></div>
                        <div class="grid-item"></div><div class="grid-item"></div>
                    </div>
                </div>
            </div>

            <div class="button-container">
                <button id="decline-btn" class="btn-decline">Decline</button>
                <button id="accept-btn" class="btn-accept">Accept</button>
            </div>
        </div>

        <div id="success-overlay" class="hidden">
            <h1>TRADE CONFIRMED! 💖</h1>
            <p>You've received: <strong>A Prom Date</strong>.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
<div class="trade-window">
    <h2>Trade Request</h2>
    <p>[Her Username] (Licensed)</p>
    <p>+</p>
    <p>[Your Username] (Licensed)</p>
    <p><strong>A Magical Night</strong></p>
    
    <div class="button-container">
        <button id="decline-btn" style="background:#ff4d4d; color:white;">Decline</button>
        <button id="accept-btn" style="background:#4caf50; color:white;">Accept</button>
    </div>
</div>
